<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#04070d" />
  <title>Posts · Ravene Hub</title>
  <link rel="stylesheet" href="assets/css/site.css" />
  <script src="assets/js/age-gate.js"></script>
</head>
<body>
  <div class="bg-noise" aria-hidden="true"></div>
  <div class="shell">
    <header class="topbar"><div class="topbar-inner"><a class="brand" href="index.html"><img class="brand-mark" src="assets/media/profile/avatar.webp" alt="" /><span class="brand-name"><strong>Ravene Hub</strong></span></a><nav class="nav"><a href="index.html">Home</a><a href="membership.html" data-auth-nav hidden>Memberships</a><a href="builds.html">Builds</a><a class="is-active" href="posts.html">Posts</a><a href="community.html" data-auth-nav hidden>Community</a><a href="account.html">Account</a></nav></div></header>
    <main class="main">
      <section class="page-title"><h1>Posts</h1><p>Development notes, build updates, art, audio, and member-facing project materials.</p></section>
      <section class="posts-page">
        <section class="posts-section glass card">
          <div class="section-line"><h2>Latest post</h2></div>
          <div data-post-feed="latest" data-limit="1"><p class="form-note">Loading latest post...</p></div>
        </section>
        <section class="posts-section glass card">
          <div class="section-line"><h2>Archive</h2><a class="mini-btn" href="account.html#admin-posts" data-admin-only hidden>Admin panel</a></div>
          <div class="post-grid" data-post-feed="grid" data-limit="24"><p class="form-note">Loading posts...</p></div>
        </section>
      </section>
    </main>
    <footer class="footer"><span>© 2026 Ravene</span><a href="privacy.html">Privacy Policy</a><a href="terms.html">Terms of Service</a></footer>
  </div>
  <script src="assets/js/site.js"></script>
</body>
</html>
